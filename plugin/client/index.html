<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ae-meta-mcp</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: "Segoe UI", -apple-system, sans-serif;
        font-size: 12px;
        margin: 0;
        padding: 12px;
        background: #2b2b2b;
        color: #d4d4d4;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 8px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #888;
        flex: 0 0 auto;
      }
      .dot.ok {
        background: #3fb950;
      }
      .dot.error {
        background: #f85149;
      }
      #status-text {
        font-weight: 500;
      }
      #host-info {
        color: #9aa0a6;
        margin-bottom: 8px;
      }
      button {
        background: #3a3a3a;
        color: #d4d4d4;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 4px 10px;
        cursor: pointer;
        font-size: 12px;
      }
      button:hover {
        background: #454545;
      }
      #log {
        margin-top: 10px;
        background: #1e1e1e;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 6px 8px;
        height: 90px;
        overflow: auto;
        white-space: pre-wrap;
        font-family: Consolas, "Courier New", monospace;
        font-size: 11px;
        color: #b5cea8;
      }
    </style>
  </head>
  <body>
    <h1>ae-meta-mcp</h1>
    <div class="row">
      <span id="status-dot" class="dot"></span>
      <span id="status-text">Starting...</span>
    </div>
    <div id="host-info">Host info...</div>
    <div class="row">
      <button id="ping-btn">Ping AE</button>
    </div>
    <div id="log"></div>

    <script src="./CSInterface.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
